{% extends 'layout.html' %}
{% block content %}

    <link rel="stylesheet" href="{{ url_for('static', filename='css/logs.css') }}"> 

    <div class="logs">
        {% include 'header.html' %}
        <div class="bento">
            <div class="divider colored">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1vh;">
                    <h1>Logs</h1>
                    <a href="{{ url_for('export_logs_csv', nom_orga=orga) }}" 
                       class="custom-btn btn-green"
                       style="padding: 0.8vh 2vh; text-decoration: none;">
                        Export CSV
                    </a>
                </div>

                <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Text</th>
                            <th>Date Logged</th>
                            <th>Type</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for log in log_list %}
                        <tr>
                            <td>{{log.text_log}}</td>
                            <td>{{log.date_log}}</td>
                            <td>{{log.type_log}}</td>
                        </tr>
                        {% else %}
                        <tr>
                            <td> Good news, there is no logs :) </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
